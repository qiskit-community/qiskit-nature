---
prelude: >
    Qiskit Nature 0.8 focus on refactoring the code to be compatible with more updated versions of 
    Qiskit and Python ecosystem,with a strong focus on long-term compatibility and maintainability. 
    This release drops support for Python 3.8 and 3.9 (minimum is now Python 3.10), adds support 
    for Python 3.12, raises the minimum Qiskit version to 1.4 (dropping Qiskit 0.x), and raises the 
    minimum qiskit-algorithms version to 0.4. QEOM has been fully aligned with the Qiskit 1.x primitive 
    model by requiring a V2 Estimator, and its complex-observable evaluation path has been updated 
    to work robustly with modern Estimator constraints.

    Alongside these compatibility updates, 0.8 introduces meaningful internal and API improvements,
    including the new ModeBasedMapper abstraction, mapper API cleanup, and expanded second-quantized
    capabilities such as MajoranaOp, TernaryTreeMapper, MixedOp/MixedMapper, and BosonicLogarithmicMapper.
    Multiple correctness and robustness fixes (for example in angular momentum handling, commutators,
    and UCC ansatz construction) make the release both more future-proof and more reliable in practice.
